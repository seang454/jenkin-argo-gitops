apiVersion: v2
name: fullstack-app
description: A fullstack application with frontend, backend, and database subcharts
type: application
version: 1.0.0
appVersion: "1.0.0"

dependencies:
  - name: frontend
    version: "1.0.0"
    repository: "file://charts/frontend"
    condition: frontend.enabled
  - name: backend
    version: "1.0.0"
    repository: "file://charts/backend"
    condition: backend.enabled
  - name: database
    version: "1.0.0"
    repository: "file://charts/database"
    condition: database.enabled
