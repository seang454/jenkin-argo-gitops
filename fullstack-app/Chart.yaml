apiVersion: v2
name: fullstack-app
description: A fullstack application with frontend, backend, and database subcharts
type: application
version: 1.0.0
appVersion: "1.0.0"

# NOTE: Order here is best-effort only.
# Actual startup order is enforced by initContainers in values.yaml.

dependencies:
  - name: database        # ← 1st: must exist before everything
    version: "1.0.0"
    repository: "file://charts/database"
    condition: database.enabled

  - name: keycloak        # ← 2nd: needs database
    version: "1.0.0"
    repository: "file://charts/keycloak"
    condition: keycloak.enabled

  - name: backend         # ← 3rd: needs database + keycloak
    version: "1.0.0"
    repository: "file://charts/backend"
    condition: backend.enabled

  - name: frontend        # ← 4th: needs backend
    version: "1.0.0"
    repository: "file://charts/frontend"
    condition: frontend.enabled

  - name: admin           # ← 5th: needs backend
    version: "1.0.0"
    repository: "file://charts/admin"
    condition: admin.enabled