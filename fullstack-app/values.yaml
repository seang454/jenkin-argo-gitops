# Global values shared across all subcharts
global:
  certManager:
    email: ""
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""
  database:
    host: "fullstack-app-database"
    port: 5432
    name: "backend-db"
    existingSecret: ""

# ──────────────────────────────────────────
# Frontend subchart values
# ──────────────────────────────────────────
frontend:
  enabled: true

  replicaCount: 2

  image:
    repository: seang454/jenkins-itp-nextjs
    pullPolicy: IfNotPresent
    tag: "979e84b"

  service:
    type: ClusterIP
    port: 80
    targetPort: 3000

  ingress:
    enabled: true
    className: "nginx"
    annotations: {}
    hosts:
      - host: frontend.seang.shop
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  env:
    REACT_APP_API_URL: "http://backend.seang.shop"

  serviceAccount:
    create: false
    name: ""

  initContainers:
    - name: wait-for-backend
      image: busybox
      command:
        - sh
        - -c
        - until nc -z fullstack-app-backend 8080; do echo "waiting for backend..."; sleep 2; done

# ──────────────────────────────────────────
# Admin subchart values
# ──────────────────────────────────────────
