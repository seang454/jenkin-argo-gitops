    className: "nginx"
    annotations: {}
    hosts:
      - host: admin.seang.shop
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  env:
    REACT_APP_API_URL: "http://backend.seang.shop"

  serviceAccount:
    create: false
    name: ""

  initContainers:                        # wait for backend before starting
    - name: wait-for-backend
      image: busybox
      command:
        - sh
        - -c
        - until nc -z my-app-backend 8080; do echo "waiting for backend..."; sleep 2; done

# ──────────────────────────────────────────
# Backend subchart values
# ──────────────────────────────────────────
backend:
  enabled: true

  replicaCount: 2

  image:
    repository: seang454/jenkins-itp-spring
    pullPolicy: IfNotPresent
    tag: "3e2ae50"

  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080

  ingress:
    enabled: true
    className: "nginx"
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /$2
    hosts:
      - host: backend.seang.shop
        paths:
          - path: /api(/|$)(.*)
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  env:
    NODE_ENV: "production"
    PORT: "8080"

  serviceAccount:
    create: false
    name: ""

  initContainers:                        # wait for database and keycloak before starting
    - name: wait-for-database
      image: busybox
      command:
        - sh
        - -c
        - until nc -z fullstack-app-database 5432; do echo "waiting for database..."; sleep 2; done
    - name: wait-for-keycloak
      image: busybox
      command:
        - sh
        - -c
        - until nc -z my-app-keycloak 80; do echo "waiting for keycloak..."; sleep 2; done

# ──────────────────────────────────────────
# Database subchart values
# ──────────────────────────────────────────
database:
  enabled: true

  image:
    repository: postgres
    pullPolicy: IfNotPresent
    tag: "15-alpine"

  service:
    type: ClusterIP
    port: 5432

  auth:
    username: "appuser"
    password: "changeme"                 # ⚠️ dev only — override with existingSecret in prod
    database: "backend-db"              # must match global.database.name
    # Reference an existing secret instead of creating one:
    existingSecret: ""                  # empty = auto-create secret from password above
    secretKeys:
      userPasswordKey: postgres-password

  persistence:
    enabled: true
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 10Gi

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  initScript:
    enabled: true                        # creates keycloak user and database on first start
    keycloakUser: "keycloak"            # must match keycloak.database.username
    keycloakPassword: "changeme"        # must match keycloak.database.password
    keycloakDatabase: "keycloak"        # must match keycloak.database.name

# ──────────────────────────────────────────
# Keycloak subchart values
# All keys here map to charts/keycloak/values.yaml
# ──────────────────────────────────────────
keycloak:
  enabled: true

  replicaCount: 1

  image:
    repository: quay.io/keycloak/keycloak
    pullPolicy: IfNotPresent
    tag: ""                              # defaults to appVersion in Chart.yaml

  keycloak:
    auth:
      adminUser: admin
      adminPassword: "changeme"          # ⚠️ dev only — override with existingSecret in prod
      existingSecret: ""
      existingSecretKey: "admin-password"

    hostname: ""                         # set per environment in values-dev/prod.yaml
    hostnameStrict: false                # overridden to true in values-prod.yaml
    hostnameStrictHttps: false           # overridden to true in values-prod.yaml
    production: false                    # overridden to true in values-prod.yaml
    proxy: edge
    httpRelativePath: "/"
    extraArgs: []                        # ← extra Keycloak startup args

  database:
    vendor: postgres
    host: "fullstack-app-database"       # same DB server as the rest of the app
    port: 5432
    name: "keycloak"                     # separate DB from backend-db
    username: "keycloak"
    password: "changeme"                 # ⚠️ dev only — override with existingSecret in prod
    existingSecret: ""
    existingSecretKey: "db-password"
    schema: public

  service:
    type: ClusterIP
    port: 80
    httpsPort: 8443                      # ← required by service.yaml

  ingress:
    enabled: false                       # enabled per environment in values-dev/prod.yaml
    className: "nginx"
    annotations: {}
    hosts:
      - host: ""                         # set per environment
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

  podDisruptionBudget:
    enabled: false
    minAvailable: 1

  persistence:
    enabled: false                       # ← required by deployment.yaml and pvc.yaml

  serviceAccount:
    create: false                        # ← required by serviceaccount.yaml
    name: ""
    automountServiceAccountToken: false  # ← required by serviceaccount.yaml

  networkPolicy:
    enabled: false                       # ← required by networkpolicy.yaml
    allowExternal: true

  podSecurityContext: {}                 # set pod-level security (e.g. runAsUser, fsGroup)
  securityContext: {}                    # set container-level security (e.g. readOnlyRootFilesystem)
  podAnnotations: {}                     # add annotations to pods (e.g. prometheus.io/scrape: "true")
  podLabels: {}                          # add extra labels to pods for grouping or routing
  nodeSelector: {}                       # pin pods to specific nodes (e.g. disktype: ssd)
  tolerations: []                        # allow pods to run on tainted/dedicated nodes
  topologySpreadConstraints: []          # spread pods evenly across zones for high availability
  initContainers:                        # run containers before main app starts
    - name: wait-for-database
      image: busybox
      command:
        - sh
        - -c
        - until nc -z fullstack-app-database 5432; do echo "waiting for database..."; sleep 2; done
  extraVolumeMounts: []                  # mount extra volumes into the container (e.g. custom configs)
  extraVolumes: []                       # define extra volumes to attach (e.g. configMaps, secrets)

  cache:
    stack: jdbc-ping

  metrics:
    enabled: false
    serviceMonitor:
      enabled: false
      interval: 30s
      scrapeTimeout: 10s                 # ← required by servicemonitor.yaml

  livenessProbe:
    httpGet:
      path: /health/live
      port: 9000
    initialDelaySeconds: 60
    periodSeconds: 30
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health/ready
      port: 9000
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3