# =============================================================================
# Base values.yaml
#
# This file contains SAFE DEFAULTS only.
# - No real passwords
# - No AVP placeholders  (those live in values-prod.yaml / values-dev.yaml)
# - No sensitive data
#
# Layering order:
#   values.yaml           ← this file  (base defaults)
#   values-prod.yaml      ← prod overrides + AVP placeholders
#   values-dev.yaml       ← dev overrides  + AVP placeholders
# =============================================================================

# ──────────────────────────────────────────
# Global
# ──────────────────────────────────────────
global:
  certManager:
    email: ""                            # overridden per env via AVP
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""
  database:
    host: "fullstack-app-database"
    port: 5432
    name: ""                             # overridden per env via AVP
    existingSecret: ""

# ──────────────────────────────────────────
# Cloudflare DNS Hook
# ──────────────────────────────────────────
cloudflare:
  secretName: "cloudflare-api-secret"
  apiToken: ""                           # injected per env via AVP
  zoneId: ""                             # injected per env via AVP
  records: []                            # defined per env (different IPs/hosts)

# ──────────────────────────────────────────
# cert-manager
# ──────────────────────────────────────────
certManager:
  enabled: true
  issuerName: "letsencrypt-prod"
  email: ""                              # injected per env via AVP
  acmeServer: "https://acme-v02.api.letsencrypt.org/directory"
  dnsZones:
    - "seang.shop"

# ──────────────────────────────────────────
# Frontend
# ──────────────────────────────────────────
frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: seang454/jenkins-itp-nextjs
    pullPolicy: IfNotPresent
    tag: "979e84b"
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
  ingress:
    enabled: true
    className: "nginx"
    annotations: {}
    hosts:
      - host: frontend.seang.shop
        paths:
          - path: /
            pathType: Prefix
    tls: []
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  env:
    REACT_APP_API_URL: "http://backend.seang.shop"
  serviceAccount:
    create: false
    name: ""
  initContainers:
    - name: wait-for-backend
      image: busybox
      command:
        - sh
        - -c
        - until nc -z fullstack-app-backend 8080; do echo "waiting for backend..."; sleep 2; done

# ──────────────────────────────────────────
# Admin
# ──────────────────────────────────────────
admin:
  enabled: true
  replicaCount: 2
  image:
    repository: seang454/jenkins-admin-nextjs
    pullPolicy: IfNotPresent
    tag: "b1e2ecc"
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
  ingress:
    enabled: true
    className: "nginx"
    annotations: {}
    hosts:
      - host: admin.seang.shop
        paths:
          - path: /
            pathType: Prefix
    tls: []
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  env:
    REACT_APP_API_URL: "http://backend.seang.shop"
  serviceAccount:
    create: false
    name: ""
  initContainers:
    - name: wait-for-backend
      image: busybox
      command:
        - sh
        - -c
        - until nc -z fullstack-app-backend 8080; do echo "waiting for backend..."; sleep 2; done

# ──────────────────────────────────────────
# Backend
# ──────────────────────────────────────────
backend:
  enabled: true
  replicaCount: 2
  image:
    repository: seang454/jenkins-itp-spring
    pullPolicy: IfNotPresent
    tag: "3e2ae50"
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  ingress:
    enabled: true
    className: "nginx"
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /$2
    hosts:
      - host: backend.seang.shop
        paths:
          - path: /api(/|$)(.*)
            pathType: Prefix
    tls: []
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  env:
    NODE_ENV: "production"
    PORT: "8080"
  serviceAccount:
    create: false
    name: ""
  initContainers:
    - name: wait-for-database
      image: busybox
      command:
        - sh
        - -c
        - until nc -z fullstack-app-database 5432; do echo "waiting for database..."; sleep 2; done
    - name: wait-for-keycloak
      image: busybox
      command:
        - sh
        - -c
        - until nc -z fullstack-app-keycloak 80; do echo "waiting for keycloak..."; sleep 2; done

# ──────────────────────────────────────────
# Database
# ──────────────────────────────────────────
database:
  enabled: true
  image:
    repository: postgres
    pullPolicy: IfNotPresent
    tag: "15-alpine"
  service:
    type: ClusterIP
    port: 5432
  auth:
    username: ""                         # injected per env via AVP
    password: ""                         # injected per env via AVP
    database: ""                         # injected per env via AVP
    existingSecret: ""
    secretKeys:
      userPasswordKey: postgres-password
  persistence:
    enabled: true
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  initScript:
    enabled: true
    keycloakUser: ""                     # injected per env via AVP
    keycloakPassword: ""                 # injected per env via AVP
    keycloakDatabase: "keycloak"

# ──────────────────────────────────────────
# Keycloak
# ──────────────────────────────────────────
keycloak:
  enabled: true
  replicaCount: 1
  image:
    repository: quay.io/keycloak/keycloak
    pullPolicy: IfNotPresent
    tag: "26.5.5"
  keycloak:
    auth:
      adminUser: ""                      # injected per env via AVP
      adminPassword: ""                  # injected per env via AVP
      existingSecret: ""
      existingSecretKey: "admin-password"
    hostname: ""                         # set per env
    hostnameStrict: false
    production: false                    # overridden to true in values-prod.yaml
    httpRelativePath: "/"
    extraArgs:
      - "--health-enabled=true"
      - "--metrics-enabled=true"
      - "--http-enabled=true"
      - "--proxy-headers=xforwarded"
      - "--hostname-backchannel-dynamic=true"
  database:
    vendor: postgres
    host: "fullstack-app-database"
    port: 5432
    name: "keycloak"
    username: ""                         # injected per env via AVP
    password: ""                         # injected per env via AVP
    existingSecret: ""
    existingSecretKey: "db-password"
    schema: public
  service:
    type: ClusterIP
    port: 80
    httpsPort: 8443
  ingress:
    enabled: false
    className: "nginx"
    annotations: {}
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix
    tls: []
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  persistence:
    enabled: false
  serviceAccount:
    create: false
    name: ""
    automountServiceAccountToken: false
  networkPolicy:
    enabled: false
    allowExternal: true
  podSecurityContext: {}
  securityContext: {}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  topologySpreadConstraints: []
  initContainers:
    - name: wait-for-database
      image: busybox
      command:
        - sh
        - -c
        - until nc -z fullstack-app-database 5432; do echo "waiting for database..."; sleep 2; done
  extraVolumeMounts: []
  extraVolumes: []
  cache:
    stack: local
  metrics:
    enabled: false
    serviceMonitor:
      enabled: false
      interval: 30s
      scrapeTimeout: 10s
  livenessProbe:
    httpGet:
      path: /health/live
      port: 9000
    initialDelaySeconds: 60
    periodSeconds: 30
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /health/ready
      port: 9000
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3
  startupProbe:
    httpGet:
      path: /health/started
      port: 9000
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30