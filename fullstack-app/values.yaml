          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  env:
    REACT_APP_API_URL: "http://backend.seang.shop"

  serviceAccount:
    create: false
    name: ""

  initContainers:
    - name: wait-for-backend
      image: busybox
      command:
        - sh
        - -c
        - until nc -z fullstack-app-backend 8080; do echo "waiting for backend..."; sleep 2; done

# ──────────────────────────────────────────
# Backend subchart values
# ──────────────────────────────────────────
backend:
  enabled: true

  replicaCount: 2

  image:
    repository: seang454/jenkins-itp-spring
    pullPolicy: IfNotPresent
    tag: "3e2ae50"

  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080

  ingress:
    enabled: true
    className: "nginx"
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /$2
    hosts:
      - host: backend.seang.shop
        paths:
          - path: /api(/|$)(.*)
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  env:
    NODE_ENV: "production"
    PORT: "8080"

  serviceAccount:
    create: false
    name: ""

  initContainers:
    - name: wait-for-database
      image: busybox
      command:
        - sh
        - -c
        - until nc -z fullstack-app-database 5432; do echo "waiting for database..."; sleep 2; done
    - name: wait-for-keycloak
      image: busybox
      command:
        - sh
        - -c
        - until nc -z fullstack-app-keycloak 80; do echo "waiting for keycloak..."; sleep 2; done

# ──────────────────────────────────────────
# Database subchart values
# ──────────────────────────────────────────
database:
  enabled: true

  image:
    repository: postgres
    pullPolicy: IfNotPresent
    tag: "15-alpine"

  service:
    type: ClusterIP
    port: 5432

  auth:
    username: "appuser"
    password: "changeme"                 # ⚠️ dev only
    database: "backend-db"
    existingSecret: ""
    secretKeys:
      userPasswordKey: postgres-password

  persistence:
    enabled: true
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 10Gi

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  initScript:
    enabled: true
    keycloakUser: "keycloak"
    keycloakPassword: "changeme"         # ⚠️ dev only
    keycloakDatabase: "keycloak"

# ──────────────────────────────────────────
# Keycloak subchart values
# ──────────────────────────────────────────
keycloak:
  enabled: true

  replicaCount: 1

  image:
    repository: quay.io/keycloak/keycloak
    pullPolicy: IfNotPresent
    tag: "26.5.5"

  keycloak:
    auth:
      adminUser: admin
      adminPassword: "changeme"          # ⚠️ dev only
      existingSecret: ""
      existingSecretKey: "admin-password"

    hostname: ""                         # set per environment
    hostnameStrict: false
    production: false                    # overridden to true in values-prod.yaml
    httpRelativePath: "/"
    extraArgs:
      - "--health-enabled=true"
      - "--metrics-enabled=true"
      - "--http-enabled=true"            # ← required for KC 26
      - "--proxy-headers=xforwarded"     # ← replaces KC_PROXY env var
      - "--hostname-backchannel-dynamic=true"

  database:
    vendor: postgres
    host: "fullstack-app-database"
    port: 5432
    name: "keycloak"
    username: "keycloak"
    password: "changeme"                 # ⚠️ dev only
    existingSecret: ""
    existingSecretKey: "db-password"
    schema: public

  service:
    type: ClusterIP
    port: 80
    httpsPort: 8443

  ingress:
    enabled: false
    className: "nginx"
    annotations: {}
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

  podDisruptionBudget:
    enabled: false
    minAvailable: 1

  persistence:
    enabled: false

  serviceAccount:
    create: false
    name: ""
    automountServiceAccountToken: false

  networkPolicy:
    enabled: false
    allowExternal: true

  podSecurityContext: {}
  securityContext: {}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  topologySpreadConstraints: []

  initContainers:
    - name: wait-for-database
      image: busybox
      command:
        - sh
        - -c
        - until nc -z fullstack-app-database 5432; do echo "waiting for database..."; sleep 2; done

  extraVolumeMounts: []
  extraVolumes: []

  cache:
    stack: local

  metrics:
    enabled: false
    serviceMonitor:
      enabled: false
      interval: 30s
      scrapeTimeout: 10s

  livenessProbe:
    httpGet:
      path: /health/live
      port: 9000                         # ← KC 26 management port
    initialDelaySeconds: 60
    periodSeconds: 30
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health/ready
      port: 9000                         # ← KC 26 management port
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3

  startupProbe:
    httpGet:
      path: /health/started
      port: 9000                         # ← KC 26 management port
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30