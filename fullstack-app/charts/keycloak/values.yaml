keycloak:
  # =============================================================================
  # Keycloak Helm Chart - Default Values
  # =============================================================================

  ## @section Global
  replicaCount: 1

  image:
    repository: quay.io/keycloak/keycloak
    pullPolicy: IfNotPresent
    tag: ""  # Defaults to appVersion in Chart.yaml

  imagePullSecrets: []
  nameOverride: ""
  fullnameOverride: ""

  ## @section Keycloak Configuration
  keycloak:
    ## Admin credentials
    auth:
      adminUser: admin
      ## Use existingSecret instead of plaintext passwords in production
      adminPassword: "changeme"
      existingSecret: ""
      existingSecretKey: "admin-password"

    ## Keycloak HTTP/HTTPS settings
    httpRelativePath: "/"
    hostname: ""              # e.g. keycloak.example.com
    hostnameStrict: false
    hostnameStrictHttps: false

    ## Production mode (enables HTTPS enforcement)
    production: false

    ## Proxy mode: none | edge | reencrypt | passthrough
    proxy: edge

    ## Extra environment variables
    extraEnv: []
    # - name: KC_LOG_LEVEL
    #   value: "INFO"

    ## Extra args to pass to the keycloak start command
    extraArgs: []
    # - --features=preview

  ## @section Database
  ## Supported: postgres | mysql | mariadb | mssql | oracle | dev-file (embedded H2, not for production)
  database:
    vendor: postgres
    host: ""                  # External DB host
    port: 5432
    name: keycloak
    username: keycloak
    password: "changeme"
    existingSecret: ""
    existingSecretKey: "db-password"
    schema: public

    ## Embedded PostgreSQL (for dev/testing only)
    embedded:
      enabled: false

  postgresql:
    ## Only used when database.embedded.enabled = true
    enabled: false
    auth:
      username: keycloak
      password: keycloak
      database: keycloak
    primary:
      persistence:
        enabled: true
        size: 8Gi

  ## @section Service Account
  serviceAccount:
    create: true
    annotations: {}
    name: ""
    automountServiceAccountToken: false

  ## @section Pod Settings
  podAnnotations: {}
  podLabels: {}

  podSecurityContext:
    fsGroup: 1000
    runAsNonRoot: true

  securityContext:
    runAsUser: 1000
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

  ## @section Service
  service:
    type: ClusterIP
    port: 80
    httpsPort: 443
    httpPort: 8080
    annotations: {}

  ## @section Ingress
  ingress:
    enabled: false
    className: ""
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # cert-manager.io/cluster-issuer: letsencrypt-prod
      # nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    hosts:
      - host: keycloak.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
    # - secretName: keycloak-tls
    #   hosts:
    #     - keycloak.example.com

  ## @section Resources
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

  ## @section Autoscaling
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

  ## @section Persistence (for themes / providers)
  persistence:
    enabled: false
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    annotations: {}

  ## @section Probes
  livenessProbe:
    httpGet:
      path: /health/live
      port: 9000
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

  readinessProbe:
    httpGet:
      path: /health/ready
      port: 9000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  startupProbe:
    httpGet:
      path: /health/started
      port: 9000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30

  ## @section Clustering (JGroups / JDBC_PING)
  cache:
    ## Infinispan cache stack: ispn | jdbc-ping
    stack: jdbc-ping

  ## @section Node Scheduling
  nodeSelector: {}
  tolerations: []
  affinity: {}

  ## Topology spread constraints for HA
  topologySpreadConstraints: []
  # - maxSkew: 1
  #   topologyKey: kubernetes.io/hostname
  #   whenUnsatisfiable: DoNotSchedule
  #   labelSelector:
  #     matchLabels:
  #       app.kubernetes.io/name: keycloak

  ## @section Network Policy
  networkPolicy:
    enabled: false
    allowExternal: true

  ## @section Pod Disruption Budget
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
    # maxUnavailable: 1

  ## @section Extra Volumes / Mounts
  extraVolumes: []
  extraVolumeMounts: []

  ## @section Init Containers
  initContainers: []

  ## @section Metrics (Prometheus)
  metrics:
    enabled: false
    serviceMonitor:
      enabled: false
      namespace: ""
      interval: 30s
      scrapeTimeout: 10s
      labels: {}
