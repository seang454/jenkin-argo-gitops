{{- if .Values.initScript.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "database.fullname" . }}-init
  labels:
    {{- include "database.labels" . | nindent 4 }}
data:
  init.sql: |
    -- Create keycloak user and database on first postgres start
    CREATE USER {{ .Values.initScript.keycloakUser }} WITH PASSWORD '{{ .Values.initScript.keycloakPassword }}';
    CREATE DATABASE {{ .Values.initScript.keycloakDatabase }} OWNER {{ .Values.initScript.keycloakUser }};
    GRANT ALL PRIVILEGES ON DATABASE {{ .Values.initScript.keycloakDatabase }} TO {{ .Values.initScript.keycloakUser }};
{{- end }}