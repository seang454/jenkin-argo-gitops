# =============================================================================
# Development Environment Overrides
# ALL credentials pulled from HashiCorp Vault via AVP at sync time
#
# Vault paths:
#   secret/dev/cloudflare    → token, zoneId
#   secret/dev/database      → username, password, database
#   secret/dev/keycloak      → admin-username, admin-password, db-username, db-password
#   secret/dev/certmanager   → email
# =============================================================================

# ── Global ─────────────────────────────────────────
global:
  database:
    host: "fullstack-app-database"
    name: <path:secret/data/dev/database#database>
    existingSecret: ""

# ── Cloudflare ─────────────────────────────────────
cloudflare:
  secretName: "cloudflare-api-secret"
  apiToken: <path:secret/data/dev/cloudflare#token>
  zoneId: <path:secret/data/dev/cloudflare#zoneId>
  records:
    - name: "frontend.seang.shop"
      type: "A"
      content: "34.22.93.174"
      ttl: 1
      proxied: true
    - name: "admin.seang.shop"
      type: "A"
      content: "34.22.93.174"
      ttl: 1
      proxied: true
    - name: "backend.seang.shop"
      type: "A"
      content: "34.22.93.174"
      ttl: 1
      proxied: true
    - name: "keycloak.dev.seang.shop"
      type: "A"
      content: "34.22.93.174"
      ttl: 1
      proxied: true

# ── cert-manager ───────────────────────────────────
certManager:
  enabled: true
  issuerName: "letsencrypt-staging"      # staging = no rate limits in dev
  email: <path:secret/data/dev/certmanager#email>
  acmeServer: "https://acme-staging-v02.api.letsencrypt.org/directory"
  dnsZones:
    - "seang.shop"

# ── Frontend ───────────────────────────────────────
frontend:
  replicaCount: 1
  image:
    tag: "979e84b"
  ingress:
    hosts:
      - host: "frontend.seang.shop"
        paths:
          - path: /
            pathType: Prefix
  hpa:
    enabled: false
  env:
    REACT_APP_API_URL: "http://backend.seang.shop"

# ── Admin ──────────────────────────────────────────
admin:
  replicaCount: 1
  image:
    tag: "b1e2ecc"
  ingress:
    hosts:
      - host: "admin.seang.shop"
        paths:
          - path: /
            pathType: Prefix
  hpa:
    enabled: false
  env:
    REACT_APP_API_URL: "http://backend.seang.shop"

# ── Backend ────────────────────────────────────────
backend:
  replicaCount: 1
  image:
    tag: "63a7930"
  ingress:
    hosts:
      - host: "backend.seang.shop"
        paths:
          - path: /api(/|$)(.*)
            pathType: Prefix
  hpa:
    enabled: false
  env:
    NODE_ENV: "development"
    PORT: "8080"

# ── Database ───────────────────────────────────────
database:
  auth:
    username: <path:secret/data/dev/database#username>
    password: <path:secret/data/dev/database#password>
    database: <path:secret/data/dev/database#database>
    existingSecret: ""
  persistence:
    size: 2Gi
  initScript:
    enabled: true
    keycloakUser: <path:secret/data/dev/keycloak#db-username>
    keycloakPassword: <path:secret/data/dev/keycloak#db-password>
    keycloakDatabase: "keycloak"

# ── Keycloak ───────────────────────────────────────
keycloak:
  replicaCount: 1

  keycloak:
    production: false
    proxy: edge
    hostname: "keycloak.dev.seang.shop"
    hostnameStrict: false
    hostnameStrictHttps: false
    auth:
      adminUser: <path:secret/data/dev/keycloak#admin-username>
      adminPassword: <path:secret/data/dev/keycloak#admin-password>
      existingSecret: ""
      existingSecretKey: "admin-password"
    extraArgs: []

  extraEnv:
    - name: KC_LOG_LEVEL
      value: "DEBUG"

  database:
    vendor: postgres
    host: "fullstack-app-database"
    port: 5432
    name: "keycloak"
    username: <path:secret/data/dev/keycloak#db-username>
    password: <path:secret/data/dev/keycloak#db-password>
    existingSecret: ""
    existingSecretKey: "db-password"
    schema: public

  ingress:
    enabled: true
    className: "nginx"
    annotations: {}
    hosts:
      - host: "keycloak.dev.seang.shop"
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  autoscaling:
    enabled: false

  podDisruptionBudget:
    enabled: false

  startupProbe:
    httpGet:
      path: /health/started
      port: 9000
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 20

  metrics:
    enabled: false
    serviceMonitor:
      enabled: false