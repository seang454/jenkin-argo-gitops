# =============================================================================
# Development Environment Overrides
# Usage: helm install my-app ./fullstack-app -f values.yaml -f values-dev.yaml
# =============================================================================

# ── Global ─────────────────────────────────────────
global:
  database:
    host: "fullstack-app-database"
    name: "appdb_dev"                    # must match database.auth.database below
    existingSecret: ""                   # empty = auto-create secret from password below

# ── Frontend ───────────────────────────────────────
frontend:
  replicaCount: 1
  image:
    tag: "979e84b"
  ingress:
    hosts:
      - host: "frontend.seang.shop"
        paths:
          - path: /
            pathType: Prefix
  hpa:
    enabled: false
  env:
    REACT_APP_API_URL: "http://backend.seang.shop"

# ── Admin ──────────────────────────────────────────
admin:
  replicaCount: 1
  image:
    tag: "b1e2ecc"
  ingress:
    hosts:
      - host: "admin.seang.shop"
        paths:
          - path: /
            pathType: Prefix
  hpa:
    enabled: false
  env:
    REACT_APP_API_URL: "http://backend.seang.shop"

# ── Backend ────────────────────────────────────────
backend:
  replicaCount: 1
  image:
    tag: "63a7930"
  ingress:
    hosts:
      - host: "backend.seang.shop"
        paths:
          - path: /api(/|$)(.*)
            pathType: Prefix
  hpa:
    enabled: false
  env:
    NODE_ENV: "development"
    PORT: "8080"

# ── Database ───────────────────────────────────────
database:
  auth:
    password: "devpassword"              # Helm auto-creates secret from this
    database: "appdb_dev"               # must match global.database.name
    existingSecret: ""                   # empty = auto-create secret
  persistence:
    size: 2Gi

# ── Keycloak subchart ──────────────────────────────
keycloak:
  replicaCount: 1

  keycloak:
    production: false
    proxy: edge
    hostname: "keycloak.dev.seang.shop"
    hostnameStrict: false
    hostnameStrictHttps: false
    auth:
      adminUser: admin
      adminPassword: "changeme"          # plaintext OK in dev
      existingSecret: ""
      existingSecretKey: "admin-password"
    extraArgs: []

  extraEnv:                              # ← correct location — read by deployment.yaml
    - name: KC_LOG_LEVEL
      value: "DEBUG"                     # verbose logging in dev

  database:
    vendor: postgres
    host: "fullstack-app-database"
    port: 5432
    name: "keycloak"
    username: "keycloak"
    password: "changeme"                 # plaintext OK in dev
    existingSecret: ""
    existingSecretKey: "db-password"

  ingress:
    enabled: true
    className: "nginx"
    annotations: {}
    hosts:
      - host: "keycloak.dev.seang.shop"
        paths:
          - path: /
            pathType: Prefix
    tls: []                              # no TLS in dev

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  autoscaling:
    enabled: false

  podDisruptionBudget:
    enabled: false

  startupProbe:
    httpGet:
      path: /health/started
      port: 9000
    initialDelaySeconds: 15             # faster startup for dev
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 20

  metrics:
    enabled: false
    serviceMonitor:
      enabled: false