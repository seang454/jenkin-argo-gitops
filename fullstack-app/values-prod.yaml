# =============================================================================
# Production Environment Overrides
# Usage: helm install fullstack-app . -f values.yaml -f values-prod.yaml
# =============================================================================

# ── Global ─────────────────────────────────────────
global:
  database:
    host: "fullstack-app-database"
    name: "appdb_prod"                          # must match database.auth.database below
    existingSecret: "postgres-prod-secret"      # backend reads DB_USER and DB_PASSWORD from here

# ── Frontend ───────────────────────────────────────
frontend:
  replicaCount: 3
  image:
    tag: "stable"
  ingress:
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"  # ← auto issue TLS cert
    hosts:
      - host: frontend.seang.shop
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: frontend-tls
        hosts:
          - frontend.seang.shop
  hpa:
    minReplicas: 3
    maxReplicas: 20
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    REACT_APP_API_URL: "https://backend.seang.shop"   # ← fixed: points to backend not itself

# ── Admin ──────────────────────────────────────────
admin:
  replicaCount: 3
  image:
    tag: "stable"
  ingress:
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"  # ← auto issue TLS cert
    hosts:
      - host: admin.seang.shop
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: admin-tls
        hosts:
          - admin.seang.shop
  hpa:
    minReplicas: 3
    maxReplicas: 20
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    REACT_APP_API_URL: "https://backend.seang.shop"

# ── Backend ────────────────────────────────────────
backend:
  replicaCount: 3
  image:
    tag: "stable"
  ingress:
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"  # ← auto issue TLS cert
      nginx.ingress.kubernetes.io/rewrite-target: /$2
    hosts:
      - host: backend.seang.shop
        paths:
          - path: /api(/|$)(.*)
            pathType: Prefix
    tls:
      - secretName: backend-tls
        hosts:
          - backend.seang.shop
  hpa:
    minReplicas: 3
    maxReplicas: 20
  resources:
    requests:
      cpu: 50m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: "1Gi"
  env:
    NODE_ENV: "production"
    PORT: "8080"

# ── Database ───────────────────────────────────────
database:
  auth:
    existingSecret: "postgres-prod-secret"      # must match global.database.existingSecret
    database: "appdb_prod"                      # must match global.database.name
  persistence:
    size: 50Gi
    storageClass: "local-path"
  initScript:
    enabled: true
    keycloakUser: "keycloak"
    keycloakPassword: ""                        # ⚠️ must match password in keycloak-db-secret
    keycloakDatabase: "keycloak"

# ── Keycloak subchart ──────────────────────────────
keycloak:
  replicaCount: 3

  keycloak:
    production: true
    proxy: edge
    hostname: "keycloak.seang.shop"
    hostnameStrict: true
    hostnameStrictHttps: true
    auth:
      adminUser: admin
      adminPassword: ""                          # ignored — existingSecret is used
      existingSecret: "keycloak-admin-secret"
      existingSecretKey: "admin-password"

  database:
    vendor: postgres
    host: "fullstack-app-database"
    port: 5432
    name: "keycloak"
    username: "keycloak"
    password: ""                                # ignored — existingSecret is used
    existingSecret: "keycloak-db-secret"
    existingSecretKey: "db-password"

  ingress:
    enabled: true
    className: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    hosts:
      - host: "keycloak.seang.shop"
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: "keycloak-tls"
        hosts:
          - "keycloak.seang.shop"

  resources:
    requests:
      cpu: "100m"
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  autoscaling:
    enabled: false
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  podDisruptionBudget:
    enabled: false
    minAvailable: 2
  # PodDisruptionBudget (PDB) is a rule that tells Kubernetes how many pods must stay running during planned disruptions.

  affinity: {}
    # podAntiAffinity:
    #   preferredDuringSchedulingIgnoredDuringExecution:
    #     - weight: 100
    #       podAffinityTerm:
    #         labelSelector:
    #           matchLabels:
    #             app.kubernetes.io/name: keycloak
    #         topologyKey: kubernetes.io/hostname

  livenessProbe:
    httpGet:
      path: /health/live
      port: 9000
    initialDelaySeconds: 120            # longer for prod — not using --optimized
    periodSeconds: 30
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health/ready
      port: 9000
    initialDelaySeconds: 60             # longer for prod
    periodSeconds: 10
    failureThreshold: 3

  startupProbe:
    httpGet:
      path: /health/started
      port: 9000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30

  cache:
    stack: jdbc-ping

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 30s
      scrapeTimeout: 10s