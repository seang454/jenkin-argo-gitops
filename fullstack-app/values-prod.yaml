# =============================================================================
# Production Environment Overrides
# Usage: helm install fullstack-app . -f values.yaml -f values-prod.yaml
# =============================================================================

# ── Global ─────────────────────────────────────────
global:
  database:
    host: "fullstack-app-database"
    name: "appdb_prod"                          # must match database.auth.database below
    existingSecret: "postgres-prod-secret"      # backend reads DB_USER and DB_PASSWORD from here

# ── Frontend ───────────────────────────────────────
frontend:
  replicaCount: 3
  image:
    tag: "stable"
  ingress:
    hosts:
      - host: frontend.seang.shop
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: frontend-tls
        hosts:
          - frontend.seang.shop
  hpa:
    minReplicas: 3
    maxReplicas: 20
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    REACT_APP_API_URL: "https://frontend.seang.shop/api"

# ── Admin ──────────────────────────────────────────
admin:
  replicaCount: 3
  image:
    tag: "stable"
  ingress:
    hosts:
      - host: admin.seang.shop
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: admin-tls
        hosts:
          - admin.seang.shop
  hpa:
    minReplicas: 3
    maxReplicas: 20
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    REACT_APP_API_URL: "https://backend.seang.shop"

# ── Backend ────────────────────────────────────────
backend:
  replicaCount: 3
  image:
    tag: "stable"
  ingress:
    hosts:
      - host: backend.seang.shop
        paths:
          - path: /api(/|$)(.*)
            pathType: Prefix
    tls:
      - secretName: backend-tls
        hosts:
          - backend.seang.shop
  hpa:
    minReplicas: 3
    maxReplicas: 20
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: "1Gi"
  env:
    NODE_ENV: "production"
    PORT: "8080"

# ── Database ───────────────────────────────────────
database:
  auth:
    existingSecret: "postgres-prod-secret"      # must match global.database.existingSecret
    database: "appdb_prod"                      # must match global.database.name
  persistence:
    size: 50Gi
    storageClass: "premium-rwo"

# ── Keycloak subchart ──────────────────────────────
keycloak:
  replicaCount: 3

  keycloak:
    production: true
    proxy: edge
    hostname: "keycloak.seang.shop"
    hostnameStrict: true
    hostnameStrictHttps: true
    auth:
      adminUser: admin
      adminPassword: ""                          # ignored — existingSecret is used
      existingSecret: "keycloak-admin-secret"
      existingSecretKey: "admin-password"

  database:
    vendor: postgres
    host: "fullstack-app-database"
    port: 5432
    name: "keycloak"
    username: "keycloak"
    password: ""                                # ignored — existingSecret is used
    existingSecret: "keycloak-db-secret"
    existingSecretKey: "db-password"

  ingress:
    enabled: true
    className: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    hosts:
      - host: "keycloak.seang.shop"
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: "keycloak-tls"
        hosts:
          - "keycloak.seang.shop"

  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 4Gi

  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  podDisruptionBudget:
    enabled: true
    minAvailable: 2

  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: keycloak
          topologyKey: kubernetes.io/hostname

  startupProbe:
    httpGet:
      path: /health/started
      port: 9000
    initialDelaySeconds: 30             # longer startup time for prod
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30

  cache:
    stack: jdbc-ping

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 30s
      scrapeTimeout: 10s                # ← required by servicemonitor.yaml