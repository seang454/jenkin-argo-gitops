# =============================================================================
# Production Environment Overrides
# ALL credentials pulled from HashiCorp Vault via AVP at sync time
#
# Vault paths:
#   secret/prod/cloudflare   → token, zoneId
#   secret/prod/database     → username, password, database
#   secret/prod/keycloak     → admin-password, db-password, db-username
#   secret/prod/certmanager  → email
# =============================================================================

# ── Global ─────────────────────────────────────────
global:
  certManager:
    email: <path:secret/data/prod/certmanager#email>
  database:
    host: "fullstack-app-database"
    name: <path:secret/data/prod/database#database>
    existingSecret: ""                   # disabled — AVP injects directly

# ── Cloudflare ─────────────────────────────────────
cloudflare:
  secretName: "cloudflare-api-secret"
  apiToken: <path:secret/data/prod/cloudflare#token>
  zoneId: <path:secret/data/prod/cloudflare#zoneId>
  records:
    - name: "frontend.seang.shop"
      type: "A"
      content: "34.22.93.174"
      ttl: 1
      proxied: true
    - name: "admin.seang.shop"
      type: "A"
      content: "34.22.93.174"
      ttl: 1
      proxied: true
    - name: "backend.seang.shop"
      type: "A"
      content: "34.22.93.174"
      ttl: 1
      proxied: true
    - name: "keycloak.seang.shop"
      type: "A"
      content: "34.22.93.174"
      ttl: 1
      proxied: true

# ── cert-manager ───────────────────────────────────
certManager:
  enabled: true
  issuerName: "letsencrypt-prod"
  email: <path:secret/data/prod/certmanager#email>
  acmeServer: "https://acme-v02.api.letsencrypt.org/directory"
  dnsZones:
    - "seang.shop"

# ── Frontend ───────────────────────────────────────
frontend:
  replicaCount: 1
  image:
    tag: "stable"
  ingress:
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - host: frontend.seang.shop
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: frontend-tls
        hosts:
          - frontend.seang.shop
  hpa:
    minReplicas: 3
    maxReplicas: 20
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    REACT_APP_API_URL: "https://backend.seang.shop"

# ── Admin ──────────────────────────────────────────
admin:
  replicaCount: 1
  image:
    tag: "stable"
  ingress:
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - host: admin.seang.shop
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: admin-tls
        hosts:
          - admin.seang.shop
  hpa:
    minReplicas: 3
    maxReplicas: 20
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    REACT_APP_API_URL: "https://backend.seang.shop"

# ── Backend ────────────────────────────────────────
backend:
  replicaCount: 1
  image:
    tag: "stable"
  ingress:
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/rewrite-target: /$2
    hosts:
      - host: backend.seang.shop
        paths:
          - path: /api(/|$)(.*)
            pathType: Prefix
    tls:
      - secretName: backend-tls
        hosts:
          - backend.seang.shop
  hpa:
    minReplicas: 3
    maxReplicas: 20
  resources:
    requests:
      cpu: 50m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: "1Gi"
  env:
    NODE_ENV: "production"
    PORT: "8080"

# ── Database ───────────────────────────────────────
database:
  auth:
    username: <path:secret/data/prod/database#username>
    password: <path:secret/data/prod/database#password>
    database: <path:secret/data/prod/database#database>
    existingSecret: ""                   # disabled — AVP injects directly
  persistence:
    size: 20Gi
    storageClass: "local-path"
  initScript:
    enabled: true
    keycloakUser: <path:secret/data/prod/keycloak#db-username>
    keycloakPassword: <path:secret/data/prod/keycloak#db-password>
    keycloakDatabase: "keycloak"

# ── Keycloak ───────────────────────────────────────
keycloak:
  replicaCount: 1

  keycloak:
    production: true
    hostname: "https://keycloak.seang.shop"
    hostnameStrict: false
    auth:
      adminUser: <path:secret/data/prod/keycloak#admin-username>
      adminPassword: <path:secret/data/prod/keycloak#admin-password>
      existingSecret: ""                 # disabled — AVP injects directly
      existingSecretKey: "admin-password"
    extraArgs:
      - "--health-enabled=true"
      - "--metrics-enabled=true"
      - "--http-enabled=true"
      - "--hostname-backchannel-dynamic=true"
      - "--proxy-headers=xforwarded"

  database:
    vendor: postgres
    host: "fullstack-app-database"
    port: 5432
    name: "keycloak"
    username: <path:secret/data/prod/keycloak#db-username>
    password: <path:secret/data/prod/keycloak#db-password>
    existingSecret: ""                   # disabled — AVP injects directly
    existingSecretKey: "db-password"
    schema: public

  persistence:
    enabled: true
    storageClass: "local-path"
    accessModes:
      - ReadWriteOnce
    size: 1Gi

  ingress:
    enabled: true
    className: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
      nginx.ingress.kubernetes.io/proxy-cookie-path: "/ /"
      nginx.ingress.kubernetes.io/proxy-cookie-domain: ".seang.shop"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    hosts:
      - host: "keycloak.seang.shop"
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: "keycloak-tls"
        hosts:
          - "keycloak.seang.shop"

  resources:
    requests:
      cpu: "100m"
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  autoscaling:
    enabled: false
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  podDisruptionBudget:
    enabled: false
    minAvailable: 2

  affinity: {}

  livenessProbe:
    httpGet:
      path: /health/live
      port: 9000
    initialDelaySeconds: 180
    periodSeconds: 30
    failureThreshold: 5

  readinessProbe:
    httpGet:
      path: /health/ready
      port: 9000
    initialDelaySeconds: 150
    periodSeconds: 10
    failureThreshold: 10

  startupProbe:
    httpGet:
      path: /health/started
      port: 9000
    initialDelaySeconds: 120
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 120

  cache:
    stack: local

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 30s
      scrapeTimeout: 10s