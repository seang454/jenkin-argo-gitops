# =============================================================================
# Production Environment Overrides
# Usage: helm install fullstack-app . -f values.yaml -f values-prod.yaml
# =============================================================================

# ── Global ─────────────────────────────────────────
global:
  certManager:
    email: "pengseangsim210@gmail.com"
  database:
    host: "fullstack-app-database"
    name: "appdb_prod"                          # must match database.auth.database below
    existingSecret: "postgres-prod-secret"      # backend reads DB_USER and DB_PASSWORD from here

# ── Frontend ───────────────────────────────────────
frontend:
  replicaCount: 1
  image:
    tag: "stable"
  ingress:
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - host: frontend.seang.shop
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: frontend-tls
        hosts:
          - frontend.seang.shop
  hpa:
    minReplicas: 3
    maxReplicas: 20
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    REACT_APP_API_URL: "https://backend.seang.shop"

# ── Admin ──────────────────────────────────────────
admin:
  replicaCount: 1
  image:
    tag: "stable"
  ingress:
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - host: admin.seang.shop
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: admin-tls
        hosts:
          - admin.seang.shop
  hpa:
    minReplicas: 3
    maxReplicas: 20
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    REACT_APP_API_URL: "https://backend.seang.shop"

# ── Backend ────────────────────────────────────────
backend:
  replicaCount: 1
  image:
    tag: "stable"
  ingress:
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/rewrite-target: /$2
    hosts:
      - host: backend.seang.shop
        paths:
          - path: /api(/|$)(.*)
            pathType: Prefix
    tls:
      - secretName: backend-tls
        hosts:
          - backend.seang.shop
  hpa:
    minReplicas: 3
    maxReplicas: 20
  resources:
    requests:
      cpu: 50m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: "1Gi"
  env:
    NODE_ENV: "production"
    PORT: "8080"

# ── Database ───────────────────────────────────────
database:
  auth:
    existingSecret: "postgres-prod-secret"
    database: "appdb_prod"
  persistence:
    size: 20Gi
    storageClass: "local-path"
  initScript:
    enabled: true
    keycloakUser: "keycloak"
    keycloakPassword: ""                        # ⚠️ must match password in keycloak-db-secret
    keycloakDatabase: "keycloak"

# ── Keycloak subchart ──────────────────────────────
keycloak:
  replicaCount: 1

  keycloak:
    production: true
    hostname: "https://keycloak.seang.shop"     # ← full URL with https:// fixes iframe error
    hostnameStrict: false                        # ← changed to false (strict + proxy = conflict)
    auth:
      adminUser: admin
      adminPassword: ""
      existingSecret: "keycloak-admin-secret"
      existingSecretKey: "admin-password"
    extraArgs:
      - "--health-enabled=true"
      - "--metrics-enabled=true"
      - "--http-enabled=true"
      - "--hostname-backchannel-dynamic=true"   # ← fixes iframe/cookie origin detection
      - "--proxy-headers=xforwarded"         # ← ADD THIS — fixes the warning + 504


  database:
    vendor: postgres
    host: "fullstack-app-database"
    port: 5432
    name: "keycloak"
    username: "keycloak"
    password: ""
    existingSecret: "keycloak-db-secret"
    existingSecretKey: "db-password"

  persistence:
    enabled: true
    storageClass: "local-path"
    accessModes:
      - ReadWriteOnce
    size: 1Gi

  ingress:
    enabled: true
    className: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
      nginx.ingress.kubernetes.io/proxy-cookie-path: "/ /"
      nginx.ingress.kubernetes.io/proxy-cookie-domain: ".seang.shop"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "600"    # ← ADD
      nginx.ingress.kubernetes.io/proxy-send-timeout: "600"    # ← ADD
    hosts:
      - host: "keycloak.seang.shop"
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: "keycloak-tls"
        hosts:
          - "keycloak.seang.shop"

  resources:
    requests:
      cpu: "100m"
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  autoscaling:
    enabled: false
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  podDisruptionBudget:
    enabled: false
    minAvailable: 2

  affinity: {}

  livenessProbe:
    httpGet:
      path: /health/live
      port: 9000
    initialDelaySeconds: 180
    periodSeconds: 30
    failureThreshold: 5

  readinessProbe:
    httpGet:
      path: /health/ready
      port: 9000
    initialDelaySeconds: 150
    periodSeconds: 10
    failureThreshold: 10

  startupProbe:
    httpGet:
      path: /health/started
      port: 9000
    initialDelaySeconds: 120
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 120

  cache:
    stack: local

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 30s
      scrapeTimeout: 10s