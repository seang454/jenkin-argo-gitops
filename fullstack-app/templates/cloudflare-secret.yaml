{{- if and .Values.cloudflare.apiToken .Values.cloudflare.zoneId }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.cloudflare.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  token: {{ required "cloudflare.apiToken is required" .Values.cloudflare.apiToken | quote }}
  zoneId: {{ required "cloudflare.zoneId is required" .Values.cloudflare.zoneId | quote }}
{{- end }}