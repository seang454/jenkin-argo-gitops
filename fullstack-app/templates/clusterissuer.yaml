{{- if .Values.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certManager.issuerName }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
  annotations:
    # weight 10: runs AFTER cloudflare-dns-job (weight 5)
    # so the domain exists before cert-manager attempts DNS01 challenge
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  acme:
    email: {{ required "certManager.email is required. Pass it with --set certManager.email=your@email.com" .Values.certManager.email | quote }}
    server: {{ .Values.certManager.acmeServer }}
    privateKeySecretRef:
      name: {{ .Values.certManager.issuerName }}-account-key
    solvers:
      - dns01:
          cloudflare:
            # Reuse the same secret created by cloudflare-secret.yaml
            apiTokenSecretRef:
              name: {{ .Values.cloudflare.secretName }}
              key: token
        selector:
          dnsZones:
            {{- range .Values.certManager.dnsZones }}
            - {{ . | quote }}
            {{- end }}
{{- end }}