apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fullstack-app-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
    # ↑ when you DELETE this app, ArgoCD also deletes
    #   all the Kubernetes resources it created
  annotations:
    # sync-wave 2: runs AFTER vault (wave 0) and AVP (wave 1)
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/seang454/jenkin-argo-gitops
    targetRevision: master
    path: fullstack-app
    plugin:
      # Use AVP plugin to resolve <path:secret/data/prod#key> placeholders
      name: argocd-vault-plugin-helm
      env:
        - name: HELM_VALUES_FILES
          value: values.yaml,values-prod.yaml
        - name: AVP_TYPE
          value: vault
        - name: AVP_AUTH_TYPE
          value: k8s                  # authenticate via Kubernetes ServiceAccount
        - name: AVP_K8S_ROLE
          value: argocd               # Vault role bound to ArgoCD ServiceAccount
        - name: VAULT_ADDR
          value: http://vault.vault.svc.k8scluster:8200

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - validate=false
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 1m

  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data                     # ignore secret diffs managed by AVP
