apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fullstack-app-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/seang454/jenkin-argo-gitops
    targetRevision: master
    path: fullstack-app
    plugin:
      name: argocd-vault-plugin-helm
      env:
        - name: HELM_VALUES_FILES
          value: values.yaml,values-dev.yaml
        - name: AVP_TYPE
          value: vault
        - name: AVP_AUTH_TYPE
          value: k8s
        - name: AVP_K8S_ROLE
          value: argocd
        - name: VAULT_ADDR
          value: http://vault.vault.svc.cluster.local:8200

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - validate=false
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 1m

  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
