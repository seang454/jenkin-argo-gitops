---
# Registers argocd-vault-plugin-helm as a custom plugin in ArgoCD
# Place this in: argocd/avp/argocd-cm-plugin.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # Register AVP as a config management plugin
  configManagementPlugins: |
    - name: argocd-vault-plugin-helm
      init:
        command: [sh, -c]
        args:
          - |
            helm dependency build
      generate:
        command: [sh, -c]
        args:
          - |
            helm template $ARGOCD_APP_NAME . \
              $(echo $HELM_VALUES_FILES | tr ',' '\n' | sed 's/^/-f /') \
              | argocd-vault-plugin generate -

# Where (argocd-vault-plugin) It Comes  From 
# it is from
# argocd-vault-plugin.yaml (in argocd/apps/)
#         │
#         ▼
# ArgoCD installs this as a Helm chart
#         │
#         ▼
# Downloads AVP binary from GitHub releases
# https://github.com/argoproj-labs/argocd-vault-plugin
#         │
#         ▼
# Copies binary into argocd-repo-server pod at:
# /usr/local/bin/argocd-vault-plugin

# HELM_VALUES_FILES is an environment variable that you set yourself in the ArgoCD Application manifest. (apps)
# ArgoCD sees plugin: argocd-vault-plugin-helm
#         │
#         ▼
# Runs INIT:
#   helm dependency build
#         │
#         ▼
# Runs GENERATE:
#   helm template myapp .
#     -f values.yaml
#     -f values-prod.yaml        ← your HELM_VALUES_FILES
#         │
#         ▼
# Output contains placeholders:
#   password: <path:secret/data/prod/keycloak#admin-password>
#         │
#         ▼
# argocd-vault-plugin generate
#   fetches real value from Vault
#         │
#         ▼
# Final output:
#   password: MyStr0ngAdminPass!   ← real secret injected ✅
#         │
#         ▼
# Applied to Kubernetes